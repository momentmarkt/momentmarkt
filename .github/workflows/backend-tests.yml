name: Backend tests

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "cities/**"
      - "data/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/backend-tests.yml"
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "cities/**"
      - "data/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run backend pytest suite
        run: uv run --project apps/backend --extra dev pytest
