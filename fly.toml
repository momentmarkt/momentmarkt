# MomentMarkt backend on Fly.io.
# fly.toml lives at repo root because the Docker build context needs
# data/ and cities/ that paths.py reads from REPO_ROOT.

app = "momentmarkt-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  MOMENTMARKT_DB_PATH = "/tmp/momentmarkt-demo.sqlite3"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
